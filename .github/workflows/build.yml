name: Build & Publish cyrsoxs

on:
  push:
    branches: [ main, build-in-ci ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive  # fetches C++ and Pybind submodules  

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.23  # installs nvcc & libs into PATH 
          with:
          cuda: '11.8'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3-dev libhdf5-dev libomp-dev
        # Installs CMake, Python headers, HDF5, OpenMP  
      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel cibuildwheel

      - name: Build wheels with cibuildwheel
        env:
          CIBW_BEFORE_BUILD: cmake .. -DCMAKE_BUILD_TYPE=Release -DPYBIND=Yes -DUSE_SUBMODULE_PYBIND=Yes
        run: |
          cibuildwheel --platform linux --output-dir dist/
        # Invokes CMake per INSTALL.md to build CyRSoXS.so for Python
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cyrsoxs-wheels
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: cyrsoxs-wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          username: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
