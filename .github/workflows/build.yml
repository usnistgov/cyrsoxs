name: Build & Publish cyrsoxs

on:
  push:
    branches: [ main, build-in-ci ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive  

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache
          key: ${{ runner.os }}-cuda-11.7.0
          restore-keys: |
            ${{ runner.os }}-cuda-

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-9 g++-9
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 100

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '11.7.0'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3-dev libhdf5-dev libomp-dev

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel cibuildwheel

      - name: Build wheels with cibuildwheel
        run: |
          cibuildwheel --platform linux --output-dir dist/
          
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cyrsoxs-wheels
          path: dist/*.whl

      - name: Upload CUDA Installer Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cuda-installer-log
          path: /var/log/cuda-installer.log
