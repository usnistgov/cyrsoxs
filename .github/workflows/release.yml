name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  actions: write

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"

      - name: Build sdist
        run: uv build --sdist -v

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA and build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nvidia-cuda-toolkit build-essential g++-10 libhdf5-dev

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"

      - name: Build wheel
        run: |
          uv python install ${{ matrix.python-version }}
          uv build --wheel -v --python ${{ matrix.python-version }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-py${{ matrix.python-version }}
          path: dist/*.whl

  publish-pypi:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "wheel-*"
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
