name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA toolkit
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nvidia-cuda-toolkit build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"

      - name: Sync and build extension
        run: |
          uv sync --all-extras
          uv build --wheel -v

      - name: Smoke test (editable)
        run: uv run pytest tests/ -v

      - name: Smoke test (wheel install)
        run: |
          uv venv /tmp/cyrsoxs-whl
          uv pip install --python /tmp/cyrsoxs-whl/bin/python dist/*.whl
          /tmp/cyrsoxs-whl/bin/python -c "import CyRSoXS; print(CyRSoXS.__name__)"
